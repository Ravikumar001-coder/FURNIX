services:
  # Backend: Java/Spring Boot
  - type: web
    name: carpenter-api
    env: java
    rootDir: carpenter-backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/carpenter-api-0.0.1-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false # Should be the URL of the frontend

  # Frontend: React/Vite
  - type: static
    name: carpenter-frontend
    env: static
    rootDir: carpenter-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Should be the URL of the backend service
