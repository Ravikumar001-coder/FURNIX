spring.application.name=carpenter-api
server.port=8080
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.secret=${jwt.secret}
app.jwt.expiration=${jwt.access-expiration-ms}
app.jwt.refreshExpiration=${jwt.refresh-expiration-ms}

app.google.client-id=${GOOGLE_CLIENT_ID:}

app.auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie.same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cookie.path=/api/auth

app.auth.rate-limit.max-attempts=${AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
app.auth.rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

app.seed.reset-admin-password=${RESET_ADMIN_PASSWORD:false}

app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
server.forward-headers-strategy=native

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.com.carpenter=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# WhatsApp Configuration
app.whatsapp.provider=${WHATSAPP_PROVIDER:placeholder}
app.whatsapp.api-key=${WHATSAPP_API_KEY:}
app.whatsapp.twilio.sid=${WHATSAPP_TWILIO_SID:}
app.whatsapp.twilio.token=${WHATSAPP_TWILIO_TOKEN:}
app.whatsapp.twilio.from=${WHATSAPP_TWILIO_FROM:}

