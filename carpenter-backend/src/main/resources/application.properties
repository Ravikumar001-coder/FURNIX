spring.application.name=carpenter-api
server.port=8080
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.secret=${jwt.secret}
app.jwt.expiration=${jwt.access-expiration-ms}
app.jwt.refreshExpiration=${jwt.refresh-expiration-ms}

app.google.client-id=${GOOGLE_CLIENT_ID:}

app.auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie.same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cookie.path=/api/auth

app.auth.rate-limit.max-attempts=${AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
app.auth.rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

app.seed.reset-admin-password=${RESET_ADMIN_PASSWORD:false}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.com.carpenter=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
